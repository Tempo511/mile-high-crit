<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLYCAM — Wash Park (dev)</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;
    font-family:"Courier New",ui-monospace,monospace;}
  #cam{display:block;width:100%;height:100%;cursor:crosshair;}
  #hud{position:fixed;top:10px;left:10px;color:#f5e9d0;font-size:12px;line-height:1.7;
    text-shadow:1px 1px 0 #000;pointer-events:none;z-index:5;
    background:rgba(26,20,35,.5);padding:8px 12px;border-radius:5px;}
  #hud b{color:#ffd166;}
  #cross{position:fixed;top:50%;left:50%;width:6px;height:6px;margin:-3px 0 0 -3px;
    border-radius:50%;background:#ffd166;box-shadow:0 0 0 1px #000;pointer-events:none;z-index:5;}
  #coord{position:fixed;bottom:12px;left:12px;color:#ffd166;font-size:14px;font-weight:bold;
    text-shadow:1px 1px 0 #000;pointer-events:none;z-index:5;
    background:rgba(26,20,35,.5);padding:6px 12px;border-radius:5px;}
  #cam{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  .fly-btn{position:fixed;right:14px;width:56px;height:56px;z-index:6;border:0;
    border-radius:12px;background:rgba(26,20,35,.55);color:#ffd166;font-size:24px;
    font-family:inherit;touch-action:none;-webkit-touch-callout:none;user-select:none;
    display:none;}
  #upBtn{bottom:150px;} #dnBtn{bottom:84px;}
  body.touch .fly-btn{display:block;}
  #uiToggle{position:fixed;top:10px;right:12px;z-index:7;border:0;border-radius:10px;
    width:40px;height:40px;background:rgba(26,20,35,.55);color:#f5e9d0;font-size:18px;
    font-family:inherit;touch-action:none;user-select:none;}
  body.clean #hud, body.clean #coord, body.clean #cross,
  body.clean .fly-btn{display:none !important;}
  body.clean #uiToggle{opacity:0.12;}
</style>
</head>
<body>
<canvas id="cam"></canvas>
<div id="cross"></div>
<div id="hud">
  FLYCAM · <span id="trackName">WASH PARK</span><br>
  <b>click</b> canvas to look · <b>Esc</b> release<br>
  <b>WASD</b> fly · <b>Space</b>/<b>Q</b> up/down · <b>Shift</b> boost
</div>
<div id="coord"></div>
<button id="upBtn" class="fly-btn">▲</button>
<button id="dnBtn" class="fly-btn">▼</button>
<button id="uiToggle" title="hide UI for recording">👁</button>
<script type="module" src="/src/flycam.js"></script>
</body>
</html>
