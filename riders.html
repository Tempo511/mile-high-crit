<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDER LAB — Denver Dash</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#241832;
    font-family:"Courier New",ui-monospace,monospace;user-select:none;}
  #lab{position:fixed;inset:0;width:100%;height:100%;cursor:grab;}
  #lab:active{cursor:grabbing;}
  #head{position:fixed;top:12px;left:0;right:0;text-align:center;color:#f5e9d0;
    pointer-events:none;z-index:5;}
  #head h1{margin:0;font-size:22px;letter-spacing:3px;color:#ffd166;
    text-shadow:2px 2px 0 #1a1423;}
  #head p{margin:4px 0 0;font-size:12px;opacity:.75;letter-spacing:1px;}
  .tag{position:fixed;transform:translate(-50%,0);color:#f5e9d0;font-size:11px;
    font-weight:bold;letter-spacing:1px;text-shadow:2px 2px 0 #1a1423;
    pointer-events:none;white-space:nowrap;z-index:4;}
  .tag.exp{color:#ffd166;}
</style>
</head>
<body>
<canvas id="lab"></canvas>
<div id="head">
  <h1>RIDER LAB</h1>
  <p>drag to spin the riders &middot; scroll to zoom &middot; gold names = experimental designs</p>
</div>
<div id="tags"></div>
<script type="module" src="/src/riderlab.js"></script>
</body>
</html>
